
<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>2D Basketball Battle</title>
<style>
body {
    margin: 0;
    background: #222;
    color: white;
    text-align: center;
    font-family: sans-serif;
}
canvas {
    background: linear-gradient(#87ceeb, #d68a2f);
    display: block;
    margin: 10px auto;
    border: 3px solid white;
}
</style>
</head>
<body>

<h2>🏀 2Dバスケ対戦ゲーム</h2>
<p>P1: A/D移動 Wジャンプ Fシュート | P2: ←/→移動 ↑ジャンプ Lシュート</p>
<p>スコア：P1 <span id="s1">0</span> - P2 <span id="s2">0</span></p>

<canvas id="game" width="800" height="400"></canvas>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

let gravity = 0.5;

// プレイヤー
function createPlayer(x, color) {
    return {
        x: x,
        y: 300,
        vx: 0,
        vy: 0,
        width: 30,
        height: 50,
        color: color,
        onGround: false
    };
}

let p1 = createPlayer(100, "blue");
let p2 = createPlayer(650, "green");

// ボール
let ball = {
    x: 400,
    y: 200,
    vx: 0,
    vy: 0,
    radius: 10,
    holder: null
};

// ゴール
let hoopLeft = { x: 20, y: 150 };
let hoopRight = { x: 740, y: 150 };

let score1 = 0;
let score2 = 0;

let keys = {};

// 入力
document.addEventListener("keydown", e => keys[e.key] = true);
document.addEventListener("keyup", e => keys[e.key] = false);

// 更新
function updatePlayer(p, left, right, jump) {
    if (keys[left]) p.vx = -3;
    else if (keys[right]) p.vx = 3;
    else p.vx = 0;

    if (keys[jump] && p.onGround) {
        p.vy = -10;
        p.onGround = false;
    }

    p.vy += gravity;
    p.x += p.vx;
    p.y += p.vy;

    if (p.y > 300) {
        p.y = 300;
        p.vy = 0;
        p.onGround = true;
    }
}

// ボール保持
function checkBallPickup(p) {
    let dx = ball.x - (p.x + p.width/2);
    let dy = ball.y - (p.y + p.height/2);
    if (Math.sqrt(dx*dx + dy*dy) < 30 && ball.holder === null) {
        ball.holder = p;
    }
}

// シュート
function shoot(p, dir) {
    if (ball.holder === p) {
        ball.holder = null;
        ball.vx = dir * 6;
        ball.vy = -8;
    }
}

// 更新
function update() {
    updatePlayer(p1, "a", "d", "w");
    updatePlayer(p2, "ArrowLeft", "ArrowRight", "ArrowUp");

    checkBallPickup(p1);
    checkBallPickup(p2);

    if (keys["f"]) shoot(p1, 1);
    if (keys["l"]) shoot(p2, -1);

    // ボール追従 or 物理
    if (ball.holder) {
        ball.x = ball.holder.x + ball.holder.width/2;
        ball.y = ball.holder.y;
    } else {
        ball.vy += gravity;
        ball.x += ball.vx;
        ball.y += ball.vy;
    }

    // 得点判定
    if (ball.x < hoopLeft.x + 20 && ball.y < hoopLeft.y + 20) {
        score2++;
        reset();
    }
    if (ball.x > hoopRight.x && ball.y < hoopRight.y + 20) {
        score1++;
        reset();
    }
}

// リセット
function reset() {
    ball.x = 400;
    ball.y = 200;
    ball.vx = 0;
    ball.vy = 0;
    ball.holder = null;
    document.getElementById("s1").textContent = score1;
    document.getElementById("s2").textContent = score2;
}

// 描画
function draw() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    // 地面
    ctx.fillStyle = "#654321";
    ctx.fillRect(0, 350, 800, 50);

    // ゴール
    ctx.fillStyle = "red";
    ctx.fillRect(hoopLeft.x, hoopLeft.y, 20, 5);
    ctx.fillRect(hoopRight.x, hoopRight.y, 20, 5);

    // プレイヤー
    ctx.fillStyle = p1.color;
    ctx.fillRect(p1.x, p1.y, p1.width, p1.height);

    ctx.fillStyle = p2.color;
    ctx.fillRect(p2.x, p2.y, p2.width, p2.height);

    // ボール
    ctx.fillStyle = "orange";
    ctx.beginPath();
    ctx.arc(ball.x, ball.y, ball.radius, 0, Math.PI*2);
    ctx.fill();
}

// ループ
function loop() {
    update();
    draw();
    requestAnimationFrame(loop);
}

loop();
</script>

</body>
</html>
