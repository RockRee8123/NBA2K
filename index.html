<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>2D Basketball Battle+</title>
<style>
body {
    margin: 0;
    background: #222;
    color: white;
    text-align: center;
}
canvas {
    display: block;
    margin: 10px auto;
    background: linear-gradient(#87ceeb, #d68a2f);
    border: 3px solid white;
}
</style>
</head>
<body>

<h2>🏀 強化版バスケ対戦</h2>
<p>
P1: A/D移動 Wジャンプ F長押しシュート Shiftダッシュ<br>
P2: ←/→移動 ↑ジャンプ L長押しシュート /ダッシュ
</p>
<p>
P1ゲージ <span id="g1">100</span> |
P2ゲージ <span id="g2">100</span>
</p>

<canvas id="game" width="800" height="400"></canvas>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

let gravity = 0.5;

// プレイヤー
function createPlayer(x, color) {
    return {
        x, y:300, vx:0, vy:0,
        width:30, height:50,
        color,
        onGround:false,
        dash:100,
        charging:false,
        power:0
    };
}

let p1 = createPlayer(100,"blue");
let p2 = createPlayer(650,"green");

// 足場
let platforms = [
    {x:250, y:260, w:100, h:10},
    {x:450, y:200, w:100, h:10}
];

// ボール
let ball = {x:400,y:200,vx:0,vy:0,r:10,holder:null};

// ゴール
let hoopLeft = {x:20,y:150};
let hoopRight = {x:740,y:150};

let keys = {};
document.addEventListener("keydown", e=>keys[e.key]=true);
document.addEventListener("keyup", e=>keys[e.key]=false);

// プレイヤー更新
function updatePlayer(p,left,right,jump,dashKey,shootKey,dir){
    let speed = 3;

    // ダッシュ
    if(keys[dashKey] && p.dash > 0){
        speed = 6;
        p.dash -= 1;
    } else {
        p.dash += 0.5;
        if(p.dash > 100) p.dash = 100;
    }

    if(keys[left]) p.vx = -speed;
    else if(keys[right]) p.vx = speed;
    else p.vx = 0;

    if(keys[jump] && p.onGround){
        p.vy = -10;
        p.onGround = false;
    }

    // シュート溜め
    if(keys[shootKey] && ball.holder===p){
        p.charging = true;
        p.power += 0.3;
        if(p.power > 10) p.power = 10;
    } else if(p.charging){
        shoot(p,dir);
        p.charging = false;
        p.power = 0;
    }

    p.vy += gravity;
    p.x += p.vx;
    p.y += p.vy;

    p.onGround = false;

    // 地面
    if(p.y > 300){
        p.y = 300;
        p.vy = 0;
        p.onGround = true;
    }

    // 足場
    platforms.forEach(pl=>{
        if(
            p.x + p.width > pl.x &&
            p.x < pl.x + pl.w &&
            p.y + p.height > pl.y &&
            p.y + p.height < pl.y + 15 &&
            p.vy >= 0
        ){
            p.y = pl.y - p.height;
            p.vy = 0;
            p.onGround = true;
        }
    });
}

// ボール取得
function pickup(p){
    let dx = ball.x - (p.x+p.width/2);
    let dy = ball.y - (p.y+p.height/2);
    if(Math.sqrt(dx*dx+dy*dy)<30 && !ball.holder){
        ball.holder = p;
    }
}

// シュート
function shoot(p,dir){
    ball.holder=null;
    let angle = Math.PI/4 + (p.power/10)*(Math.PI/4); // 最大90度
    ball.vx = dir * Math.cos(angle) * p.power;
    ball.vy = -Math.sin(angle) * p.power;
}

// 更新
function update(){
    updatePlayer(p1,"a","d","w","Shift","f",1);
    updatePlayer(p2,"ArrowLeft","ArrowRight","ArrowUp","/","l",-1);

    pickup(p1);
    pickup(p2);

    // ボール
    if(ball.holder){
        ball.x = ball.holder.x + ball.holder.width/2;
        ball.y = ball.holder.y;
    } else {
        ball.vy += gravity;
        ball.x += ball.vx;
        ball.y += ball.vy;

        // 地面バウンド
        if(ball.y + ball.r > 350){
            ball.y = 350 - ball.r;
            ball.vy *= -0.7;
            ball.vx *= 0.9;
        }

        // 壁
        if(ball.x-ball.r<0 || ball.x+ball.r>800){
            ball.vx *= -0.7;
        }
    }

    // ゴール
    if(ball.x<40 && ball.y<170){ reset(2); }
    if(ball.x>740 && ball.y<170){ reset(1); }

    document.getElementById("g1").textContent = Math.floor(p1.dash);
    document.getElementById("g2").textContent = Math.floor(p2.dash);
}

function reset(scored){
    ball.x=400; ball.y=200;
    ball.vx=ball.vy=0;
    ball.holder=null;
}

// 描画
function draw(){
    ctx.clearRect(0,0,800,400);

    // 地面
    ctx.fillStyle="#654321";
    ctx.fillRect(0,350,800,50);

    // 足場
    ctx.fillStyle="#888";
    platforms.forEach(pl=>{
        ctx.fillRect(pl.x,pl.y,pl.w,pl.h);
    });

    // ゴール
    ctx.fillStyle="red";
    ctx.fillRect(20,150,20,5);
    ctx.fillRect(740,150,20,5);

    // プレイヤー
    ctx.fillStyle=p1.color;
    ctx.fillRect(p1.x,p1.y,p1.width,p1.height);

    ctx.fillStyle=p2.color;
    ctx.fillRect(p2.x,p2.y,p2.width,p2.height);

    // ボール
    ctx.fillStyle="orange";
    ctx.beginPath();
    ctx.arc(ball.x,ball.y,ball.r,0,Math.PI*2);
    ctx.fill();
}

// ループ
function loop(){
    update();
    draw();
    requestAnimationFrame(loop);
}
loop();
</script>

</body>
</html>
